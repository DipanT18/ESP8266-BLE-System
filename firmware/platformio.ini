; platformio.ini
; PlatformIO build configuration for ESP32 BLE Attendance System
;
; Install PlatformIO: https://platformio.org/install
; Build:              pio run
; Upload firmware:    pio run --target upload
; Upload filesystem:  pio run --target uploadfs
; Serial monitor:     pio device monitor

; Source and data directories must live in [platformio], not [env:*].
[platformio]
src_dir  = src
data_dir = data

[env:esp32dev]
platform   = espressif32
board      = esp32dev
framework  = arduino

; LittleFS filesystem
board_build.filesystem = littlefs

; Serial monitor speed
monitor_speed = 115200

; -------------------------------------------------------------------------
; Dependencies
; -------------------------------------------------------------------------
lib_deps =
    ; Lightweight BLE stack for ESP32 (uses ~50 KB less RAM than default)
    h2zero/NimBLE-Arduino           @ ^1.4.2
    ; Async HTTP server + WebSocket
    me-no-dev/ESPAsyncWebServer     @ ^1.2.3
    me-no-dev/AsyncTCP              @ ^1.1.1
    ; JSON
    bblanchon/ArduinoJson           @ ^6.21.3

; -------------------------------------------------------------------------
; Build flags
; -------------------------------------------------------------------------
build_flags =
    ; Enable LittleFS and disable SPIFFS (saves flash)
    -D CONFIG_LITTLEFS_FOR_IDF_3_2
    ; NimBLE – use NimBLE instead of Bluedroid
    -D CONFIG_BT_NIMBLE_ENABLED=1
    ; Increase stack for async web server tasks
    -D CONFIG_ASYNC_TCP_RUNNING_CORE=1
    ; Optional: set your timezone string (see POSIX TZ rules)
    ; -D TIMEZONE="IST-5:30"
