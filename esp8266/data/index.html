<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BLE Attendance System</title>
  <style>
    /* ------------------------------------------------------------------ */
    /* Reset + base                                                         */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f4f8;
      color: #2d3748;
      min-height: 100vh;
    }

    header {
      background: #2b6cb0;
      color: #fff;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.25rem; flex: 1; }
    #session-badge {
      font-size: 0.8rem;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-weight: 600;
      background: #fc8181;
      color: #fff;
    }
    #session-badge.active { background: #68d391; }

    nav {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: #ebf4ff;
      border-bottom: 1px solid #bee3f8;
    }
    nav button {
      padding: 0.4rem 1rem;
      border: 1px solid #90cdf4;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 0.875rem;
      transition: background 0.15s;
    }
    nav button:hover { background: #bee3f8; }
    nav button.active { background: #2b6cb0; color: #fff; border-color: #2b6cb0; }

    main { padding: 1.5rem; max-width: 960px; margin: 0 auto; }

    /* ------------------------------------------------------------------ */
    /* Section cards                                                        */
    /* ------------------------------------------------------------------ */
    .section { display: none; }
    .section.visible { display: block; }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      padding: 1.25rem;
      margin-bottom: 1.25rem;
    }
    .card h2 { font-size: 1rem; margin-bottom: 1rem; color: #2b6cb0; }

    /* ------------------------------------------------------------------ */
    /* Tables                                                               */
    /* ------------------------------------------------------------------ */
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th, td { padding: 0.6rem 0.8rem; text-align: left; border-bottom: 1px solid #e2e8f0; }
    th { background: #ebf4ff; font-weight: 600; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f7fafc; }

    /* ------------------------------------------------------------------ */
    /* Session control                                                      */
    /* ------------------------------------------------------------------ */
    .btn {
      display: inline-block;
      padding: 0.5rem 1.25rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
      margin-right: 0.5rem;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-green { background: #48bb78; color: #fff; }
    .btn-red   { background: #fc8181; color: #fff; }
    .btn-blue  { background: #4299e1; color: #fff; }

    /* ------------------------------------------------------------------ */
    /* Registration form                                                    */
    /* ------------------------------------------------------------------ */
    .form-row { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .form-row input {
      flex: 1;
      min-width: 160px;
      padding: 0.45rem 0.75rem;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      font-size: 0.875rem;
    }

    /* ------------------------------------------------------------------ */
    /* Status bar                                                           */
    /* ------------------------------------------------------------------ */
    #status-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 0.4rem 1rem;
      font-size: 0.78rem;
      background: #2d3748;
      color: #a0aec0;
    }
    #status-bar span { color: #68d391; }
  </style>
</head>
<body>

<header>
  <h1>📡 BLE Attendance System</h1>
  <div id="session-badge">Session: Inactive</div>
</header>

<nav>
  <button class="active" onclick="showSection('attendance')">Live Attendance</button>
  <button onclick="showSection('students')">Students</button>
  <button onclick="showSection('session')">Session</button>
</nav>

<main>

  <!-- ------------------------------------------------------------------ -->
  <!-- SECTION: Live Attendance                                             -->
  <!-- ------------------------------------------------------------------ -->
  <div id="sec-attendance" class="section visible">
    <div class="card">
      <h2>📋 Attendance Records
        <button class="btn btn-blue" style="float:right;padding:0.3rem 0.8rem;font-size:0.78rem"
                onclick="loadAttendance()">↻ Refresh</button>
      </h2>
      <table>
        <thead><tr><th>#</th><th>Name</th><th>Device ID</th><th>Session</th><th>Time</th></tr></thead>
        <tbody id="attendance-body"><tr><td colspan="5">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- ------------------------------------------------------------------ -->
  <!-- SECTION: Students                                                    -->
  <!-- ------------------------------------------------------------------ -->
  <div id="sec-students" class="section">
    <div class="card">
      <h2>➕ Register Student</h2>
      <div class="form-row">
        <input id="reg-name"   type="text" placeholder="Full name" />
        <input id="reg-device" type="text" placeholder="BLE Device ID (AA:BB:CC:DD)" />
      </div>
      <button class="btn btn-green" onclick="registerStudent()">Register</button>
      <span id="reg-msg" style="font-size:0.8rem;margin-left:0.5rem"></span>
    </div>
    <div class="card">
      <h2>👥 Registered Students</h2>
      <table>
        <thead><tr><th>#</th><th>Name</th><th>Device ID</th></tr></thead>
        <tbody id="students-body"><tr><td colspan="3">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- ------------------------------------------------------------------ -->
  <!-- SECTION: Session                                                     -->
  <!-- ------------------------------------------------------------------ -->
  <div id="sec-session" class="section">
    <div class="card">
      <h2>⏱ Session Control</h2>
      <button id="btn-start" class="btn btn-green" onclick="startSession()">▶ Start Session</button>
      <button id="btn-stop"  class="btn btn-red"   onclick="stopSession()" disabled>■ Stop Session</button>
    </div>
    <div class="card">
      <h2>Status</h2>
      <pre id="session-info" style="font-size:0.85rem;line-height:1.6"></pre>
    </div>
  </div>

</main>

<div id="status-bar">Last update: <span id="last-update">–</span></div>

<script>
/* ========================================================================
 * Configuration
 * NOTE: Change AUTH_TOKEN to match the value set in api_handlers.h on the
 * ESP8266 firmware.  In a production deployment, prompt the user to enter
 * the token rather than hard-coding it here.
 * ======================================================================== */
// In production, change this to the ESP8266's IP or mDNS name.
// When served from the ESP itself, relative URLs work (leave empty).
const BASE_URL = "";
const AUTH_TOKEN = "esp8266-attend-secret"; // must match firmware AUTH_TOKEN

/* ========================================================================
 * API helpers
 * ======================================================================== */
const headers = {
  "Content-Type": "application/json",
  "Authorization": `Bearer ${AUTH_TOKEN}`
};

async function apiFetch(path, options = {}) {
  try {
    const res = await fetch(BASE_URL + path, {
      headers,
      ...options,
      headers: { ...headers, ...(options.headers || {}) }
    });
    return await res.json();
  } catch (e) {
    console.error("API error:", e);
    return null;
  }
}

/* ========================================================================
 * Navigation
 * ======================================================================== */
function showSection(name) {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("visible"));
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));

  document.getElementById("sec-" + name).classList.add("visible");
  event.target.classList.add("active");

  if (name === "students")   loadStudents();
  if (name === "attendance") loadAttendance();
  if (name === "session")    loadSession();
}

/* ========================================================================
 * Attendance
 * ======================================================================== */
async function loadAttendance() {
  const data = await apiFetch("/attendance");
  const tbody = document.getElementById("attendance-body");
  if (!data || !data.length) {
    tbody.innerHTML = "<tr><td colspan='5'>No records yet.</td></tr>";
    updateTimestamp();
    return;
  }
  tbody.innerHTML = data.map((r, i) => `
    <tr>
      <td>${i + 1}</td>
      <td>${esc(r.name)}</td>
      <td><code>${esc(r.device_id)}</code></td>
      <td>${esc(r.session_id)}</td>
      <td>${r.timestamp ? new Date(r.timestamp * 1000).toLocaleTimeString() : "–"}</td>
    </tr>`).join("");
  updateTimestamp();
}

/* ========================================================================
 * Students
 * ======================================================================== */
async function loadStudents() {
  const data = await apiFetch("/students");
  const tbody = document.getElementById("students-body");
  if (!data || !data.length) {
    tbody.innerHTML = "<tr><td colspan='3'>No students registered.</td></tr>";
    return;
  }
  tbody.innerHTML = data.map((s, i) => `
    <tr>
      <td>${i + 1}</td>
      <td>${esc(s.name)}</td>
      <td><code>${esc(s.device_id)}</code></td>
    </tr>`).join("");
}

async function registerStudent() {
  const name     = document.getElementById("reg-name").value.trim();
  const deviceId = document.getElementById("reg-device").value.trim();
  const msg      = document.getElementById("reg-msg");

  if (!name || !deviceId) { msg.textContent = "⚠ Fill all fields"; return; }

  const res = await apiFetch("/register", {
    method: "POST",
    body: JSON.stringify({ name, device_id: deviceId })
  });

  if (res && res.ok) {
    msg.style.color = "green";
    msg.textContent = "✔ Registered!";
    document.getElementById("reg-name").value   = "";
    document.getElementById("reg-device").value = "";
    loadStudents();
  } else {
    msg.style.color = "red";
    msg.textContent = "✘ " + (res && res.error ? res.error : "Failed");
  }
}

/* ========================================================================
 * Session
 * ======================================================================== */
async function loadSession() {
  const s = await apiFetch("/session");
  if (!s) return;
  renderSession(s);
}

function renderSession(s) {
  const badge   = document.getElementById("session-badge");
  const info    = document.getElementById("session-info");
  const btnStart = document.getElementById("btn-start");
  const btnStop  = document.getElementById("btn-stop");

  badge.textContent = s.active ? "Session: Active" : "Session: Inactive";
  badge.className   = s.active ? "active" : "";

  btnStart.disabled = !!s.active;
  btnStop.disabled  = !s.active;

  info.textContent = JSON.stringify(s, null, 2);
}

async function startSession() {
  const res = await apiFetch("/start-session", { method: "POST" });
  if (res) renderSession(res);
  loadAttendance();
}

async function stopSession() {
  const res = await apiFetch("/stop-session", { method: "POST" });
  if (res) renderSession(res);
}

/* ========================================================================
 * Utilities
 * ======================================================================== */
function esc(str) {
  if (!str) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function updateTimestamp() {
  document.getElementById("last-update").textContent = new Date().toLocaleTimeString();
}

/* ========================================================================
 * Auto-refresh attendance every 5 seconds
 * ======================================================================== */
setInterval(() => {
  const sec = document.getElementById("sec-attendance");
  if (sec.classList.contains("visible")) loadAttendance();
}, 5000);

// Initial load
loadAttendance();
loadSession();
</script>
</body>
</html>
