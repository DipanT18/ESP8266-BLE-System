; platformio.ini
; PlatformIO build configuration for ESP8266 Attendance System
;
; Install PlatformIO: https://platformio.org/install
; Build:  pio run
; Upload: pio run --target upload
; Upload filesystem (LittleFS): pio run --target uploadfs

[env:nodemcuv2]
platform   = espressif8266
board      = nodemcuv2
framework  = arduino

; Use ESP8266 Arduino core 3.x (includes LittleFS)
platform_packages =
    framework-arduinoespressif8266 @ ~3.1.0

; LittleFS filesystem
board_build.filesystem = littlefs

; Source directory
src_dir = main

; Dependencies
lib_deps =
    me-no-dev/ESPAsyncWebServer @ ^1.2.3
    me-no-dev/ESPAsyncTCP       @ ^1.2.2
    bblanchon/ArduinoJson       @ ^6.21.3

; Build flags: increase TCP MSS for better HTTP throughput, enable LittleFS
build_flags =
    -D PIO_FRAMEWORK_ARDUINO_LWIP2_HIGHER_BANDWIDTH
    -D ARDUINO_ESP8266_NODEMCU

monitor_speed = 115200
